{% extends "govuk-prototype-kit/layouts/govuk-branded.njk" %}

{% block head %}
  {{ super() }}
  <link rel="stylesheet" href="/public/stylesheets/accessible-autocomplete.min.css">
   <link rel="stylesheet" href="/public/stylesheets/dfefrontend.css">
{% endblock %}



{% block scripts %}
  {{ super() }}

  
<script>
  console.log("JS is definitely running")
</script>

<script src="/public/javascripts/test.js"></script>

  <script src="/public/javascripts/dfefrontend.min.js"></script>


<script src="/public/javascripts/accessible-autocomplete.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      console.log("Autocomplete loaded")

      const select = document.querySelector('#my-select')

      if (select) {
        accessibleAutocomplete.enhanceSelectElement({
          selectElement: select,
          showAllValues: true
        })
      }
    })
  </script>

{% endblock %}
